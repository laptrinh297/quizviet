# Production — dùng cho Dokploy
# Các biến ${...} được set trong UI của Dokploy (Environment Variables)
#
# LƯU Ý: Không cần khai báo "ports" cho service app.
# Dokploy dùng Traefik làm reverse proxy, tự điều hướng traffic vào container.
# Chỉ cần cấu hình domain trong Dokploy UI.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/quizviet
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: quizviet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quizviet"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
