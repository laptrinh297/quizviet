<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#4f46e5"/>
  <!-- Back card (rotated) -->
  <rect x="10" y="8" width="15" height="11" rx="2.5" fill="rgba(255,255,255,0.35)" transform="rotate(8 17.5 13.5)"/>
  <!-- Front card -->
  <rect x="7" y="10" width="15" height="11" rx="2.5" fill="white"/>
  <!-- Lines on front card -->
  <rect x="9.5" y="13" width="7" height="1.5" rx="0.75" fill="#4f46e5"/>
  <rect x="9.5" y="16" width="10" height="1.5" rx="0.75" fill="#a5b4fc"/>
  <!-- Checkmark bottom right -->
  <circle cx="23" cy="23" r="5.5" fill="#22c55e"/>
  <polyline points="20.5,23 22.3,24.8 25.5,21.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
